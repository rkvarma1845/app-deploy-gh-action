name: Build & Deploy Node.js Container App

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      force_infra:
        description: 'Force infrastructure re-deploy even if no Bicep changes'
        required: false
        type: boolean
        default: false
      force_app:
        description: 'Force app build-push even if no app code changes'
        required: false
        type: boolean
        default: false
      environment:
        description: "Environment name for GH Secrets"
        required: true
        type: choice
        options: [dev, qa, main]
        default: "dev"

# ─── Permissions for OIDC token ───────────────────────────────────────────────
permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write

# ─── Global env vars ─────────────────────────────────────────────────────────
env:
  APP_NAME: nodejs-app
  ACR_NAME: depappacr
  RESOURCE_GROUP: nodejs-app-rg
  LOCATION: centralindia
  CLIENT_NAMES: '["client1", "client2", "client3"]'
  IMAGE_NAME: rengine
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─── Cancel in-flight runs on the same branch ────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 – Detect which parts of the repo have changed
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    outputs:
      infra_changed: ${{ steps.changes.outputs.infra }}
      app_changed:   ${{ steps.changes.outputs.app }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2   # Full history needed for accurate diff

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'bicep/**'
            app:
              - 'index.js'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 – Build & push Docker image to ACR
  #         Runs when app files changed (or forced). Does NOT wait for infra.
  #         Outputs the image tag for downstream jobs to consume.
  # ═══════════════════════════════════════════════════════════════════════════
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: detect-changes
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    if: |
      needs.detect-changes.outputs.app_changed == 'true' ||
      github.event.inputs.force_app == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── OIDC login ────────────────────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Build image tag from short SHA ────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "image_tag=$(date +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      # ── Login to ACR via Azure CLI (uses the OIDC session) ────────────────
      - name: Login to ACR
        run: az acr login --name "${{ env.ACR_NAME }}"

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t "${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}" \
            .

      # ── Push both tagged and latest ───────────────────────────────────────
      - name: Push Docker image
        run: |
          docker push "${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 – Deploy / update Azure infrastructure
  #         Runs when Bicep changed (or forced) AND build-push succeeded or
  #         was skipped. Blocked if build-push failed.
  #
  #         Image resolution:
  #           • build-push succeeded → use the new image tag from that job
  #           • build-push skipped   → query the currently running image from
  #                                    the Container App and reuse it
  # ═══════════════════════════════════════════════════════════════════════════
  infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: [detect-changes, build-push]
    if: |
      always() &&
      (
        needs.detect-changes.outputs.infra_changed == 'true' ||
        github.event.inputs.force_infra == 'true'
      ) &&
      needs.detect-changes.result == 'success' &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── OIDC login ────────────────────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image tag
        id: image
        run: |
          if [ "${{ needs.build-push.result }}" == "success" ]; then
            IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image_tag }}"
            echo "source=build-push" >> "$GITHUB_OUTPUT"
          else
            echo "build-push was skipped — fetching current image from first client container app..."
            CLIENT=$(echo '${{ env.CLIENT_NAMES }}' | jq -r '.[0]')
            IMAGE=$(az containerapp show \
              --name           "${{ env.APP_NAME }}-${CLIENT}-container" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query          "properties.template.containers[0].image" \
              --output         tsv)
            echo "source=existing" >> "$GITHUB_OUTPUT"
          fi

          IMAGE_NAME_TAG="${IMAGE##*/}"
          echo "image=$IMAGE_NAME_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved image: $IMAGE_NAME_TAG"

      # ── Deploy all Bicep modules, passing the resolved image ──────────────
      - name: Deploy Bicep Infrastructure
        id: bicep
        run: |
          RESULT=$(az deployment group create \
            --debug                           \
            --verbose                         \
            --subscription    "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group  "${{ env.RESOURCE_GROUP }}"            \
            --template-file   bicep/main.bicep                       \
            --parameters                                              \
                appName="$APP_NAME"                                   \
                acrName="$ACR_NAME"                                   \
                containerImage="${{ steps.image.outputs.image }}"     \
                clientNames="$CLIENT_NAMES"                           \
            --output json)
          
          echo "client_container_apps=$(echo "$RESULT" | jq -c '.properties.outputs.clientContainerApps.value')" >> "$GITHUB_OUTPUT"


      - name: Print Infrastructure Outputs
        run: |
          echo "Image source     : ${{ steps.image.outputs.source }}"
          echo "Image deployed   : ${{ steps.image.outputs.image }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 – Update Container App image
  #         Only runs when build-push succeeded AND infra was skipped
  #         (app changed, Bicep did not). When infra ran, the image was
  #         already set via the Bicep parameter — no second update needed.
  # ═══════════════════════════════════════════════════════════════════════════
  update-container-app:
    name: Update Container App
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    needs: [detect-changes, build-push, infrastructure]
    if: |
      always() &&
      needs.detect-changes.result  == 'success' &&
      needs.build-push.result      == 'success' &&
      needs.infrastructure.result  == 'skipped'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── OIDC login ────────────────────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App images
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ needs.build-push.outputs.image_tag }}"

          for CLIENT in $(echo '${{ env.CLIENT_NAMES }}' | jq -r '.[]'); do
            echo "▶ Updating ${{ env.APP_NAME }}-${CLIENT}-container..."
            az containerapp update \
              --name           "${{ env.APP_NAME }}-${CLIENT}-container" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image          "$IMAGE"
          done

      - name: Get App URLs
        run: |
          echo ""
          for CLIENT in $(echo '${{ env.CLIENT_NAMES }}' | jq -r '.[]'); do
            URL=$(az containerapp show \
              --name           "${{ env.APP_NAME }}-${CLIENT}-container" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query          "properties.configuration.ingress.fqdn" \
              --output tsv)
            echo "✅ ${CLIENT} — https://$URL"
            echo "❤️  Health  — https://$URL/health"
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 5 – Notify when nothing changed (informational only)
  # ═══════════════════════════════════════════════════════════════════════════
  no-changes:
    name: No Changes Detected
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.infra_changed == 'false' &&
      needs.detect-changes.outputs.app_changed   == 'false' &&
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Nothing to deploy
        run: |
          echo "ℹ️  No infrastructure or application changes detected."
          echo "    Skipping deploy. Use 'force_infra' or 'force_app' inputs"
          echo "    in a manual workflow_dispatch run to override."