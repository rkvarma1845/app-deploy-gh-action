name: Build & Deploy Node.js Container App

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      force_infra:
        description: 'Force infrastructure re-deploy even if no Bicep changes'
        required: false
        type: boolean
        default: false
      force_app:
        description: 'Force app re-deploy even if no app code changes'
        required: false
        type: boolean
        default: false

# ─── Permissions for OIDC token ───────────────────────────────────────────────
permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write

# ─── Global env vars ─────────────────────────────────────────────────────────
env:
  APP_NAME: nodejs-app
  ACR_NAME: depappacr
  RESOURCE_GROUP: nodejs-app-rg
  IDENTITY_NAME: nodejs-uami
  LOCATION: centralindia

# ─── Cancel in-flight runs on the same branch ────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 – Detect which parts of the repo have changed
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.changes.outputs.infra }}
      app_changed:   ${{ steps.changes.outputs.app }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for accurate diff

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'bicep/**'
            app:
              - 'index.js'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 – Deploy / update Azure infrastructure (only when Bicep changed)
  # ═══════════════════════════════════════════════════════════════════════════
  infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    # Run when: Bicep files changed  OR  force flag set  OR  manual dispatch
    if: |
      needs.detect-changes.outputs.infra_changed == 'true' ||
      github.event.inputs.force_infra == 'true'            ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── OIDC login – no long-lived client secret required ─────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Ensure UAMI exists before Bicep references it as 'existing' ───────
      - name: Create / Ensure User Assigned Identity
        id: uami
        run: |
          chmod +x scripts/create-uami.sh
          scripts/create-uami.sh \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --location       "${{ env.LOCATION }}"       \
            --identity-name  "${{ env.IDENTITY_NAME }}"

      # ── Deploy all Bicep modules via the orchestrating main.bicep ─────────
      - name: Deploy Bicep Infrastructure
        id: bicep
        run: |
          RESULT=$(az deployment group create \
            --debug                           \
            --verbose                         \
            --subscription    "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group  "${{ env.RESOURCE_GROUP }}"            \
            --template-file   bicep/main.bicep                       \
            --parameters                                              \
                appName="$APP_NAME"                                   \
                acrName="$ACR_NAME"                                   \
                userAssignedIdentityName="$IDENTITY_NAME"             \
            --output json)

          echo "acr_login_server=$(echo "$RESULT" | jq -r '.properties.outputs.acrLoginServer.value')"   >> "$GITHUB_OUTPUT"
          echo "container_app=$(echo "$RESULT"    | jq -r '.properties.outputs.containerAppName.value')" >> "$GITHUB_OUTPUT"
          echo "app_url=$(echo "$RESULT"          | jq -r '.properties.outputs.appUrl.value')"           >> "$GITHUB_OUTPUT"

      - name: Print Infrastructure Outputs
        run: |
          echo "ACR Login Server : ${{ steps.bicep.outputs.acr_login_server }}"
          echo "Container App    : ${{ steps.bicep.outputs.container_app }}"
          echo "App URL          : ${{ steps.bicep.outputs.app_url }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 – Build & push Docker image, update Container App
  #         Only runs when app files changed (or forced)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-app:
    name: Build & Deploy App
    runs-on: ubuntu-latest
    needs: [detect-changes, infrastructure]
    # 'infrastructure' may be skipped; allow this job to run anyway
    if: |
      always() &&
      (
        needs.detect-changes.outputs.app_changed == 'true' ||
        github.event.inputs.force_app == 'true'            ||
        github.event_name == 'workflow_dispatch'
      ) &&
      needs.detect-changes.result == 'success' &&
      (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── OIDC login ────────────────────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Build image tag from short SHA ────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      # ── Login to ACR via Azure CLI (uses the OIDC session) ────────────────
      - name: Login to ACR
        run: az acr login --name "${{ env.ACR_NAME }}"

      # ── Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ steps.tag.outputs.image_tag }}" \
            -t "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:latest" \
            .

      # ── Push both tagged and latest ───────────────────────────────────────
      - name: Push Docker image
        run: |
          docker push "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ steps.tag.outputs.image_tag }}"
          docker push "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:latest"

      # ── Update Container App to new image ─────────────────────────────────
      - name: Update Container App image
        run: |
          az containerapp update \
            --name            "${{ env.APP_NAME }}-container" \
            --resource-group  "${{ env.RESOURCE_GROUP }}"     \
            --image           "${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ steps.tag.outputs.image_tag }}"

      # ── Wait for rollout then print URL ───────────────────────────────────
      - name: Get App URL
        run: |
          URL=$(az containerapp show \
            --name           "${{ env.APP_NAME }}-container" \
            --resource-group "${{ env.RESOURCE_GROUP }}"     \
            --query          "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo ""
          echo "✅ Deployment complete!"
          echo "🌐 App URL: https://$URL"
          echo "❤️  Health : https://$URL/health"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 – Notify when nothing changed (informational only)
  # ═══════════════════════════════════════════════════════════════════════════
  no-changes:
    name: No Changes Detected
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.infra_changed == 'false' &&
      needs.detect-changes.outputs.app_changed   == 'false' &&
      github.event_name != 'workflow_dispatch'

    steps:
      - name: Nothing to deploy
        run: |
          echo "ℹ️  No infrastructure or application changes detected."
          echo "    Skipping deploy. Use 'force_infra' or 'force_app' inputs"
          echo "    in a manual workflow_dispatch run to override."
